services:
  # Frontend web application
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agentteams-web
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agentteams-network

networks:
  agentteams-network:
    external: true
    name: docker_agentteams-network
