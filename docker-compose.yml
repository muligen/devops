version: '3.8'

services:
  # Frontend web application
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - agentteams-network

  # Backend API server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=agentteams
      - DB_PASSWORD=agentteams123
      - DB_NAME=agentteams
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - JWT_SECRET=your-secret-key-change-in-production
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - agentteams-network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=agentteams
      - POSTGRES_PASSWORD=agentteams123
      - POSTGRES_DB=agentteams
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agentteams-network

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - agentteams-network

  # RabbitMQ message queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=agentteams
      - RABBITMQ_DEFAULT_PASS=agentteams123
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - agentteams-network

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  agentteams-network:
    driver: bridge
