apiVersion: v1
kind: ConfigMap
metadata:
  name: agentteams-config
data:
  # Application settings
  LOG_LEVEL: "info"
  GIN_MODE: "release"

  # Database settings
  POSTGRES_DB: "agentteams"

  # Redis settings
  REDIS_DB: "0"

  # MinIO settings
  MINIO_BUCKET: "agentteams"

  # RabbitMQ settings
  RABBITMQ_VHOST: "/"
---
apiVersion: v1
kind: Secret
metadata:
  name: agentteams-secrets
type: Opaque
stringData:
  # Database connection
  database-url: "postgres://agentteams:CHANGE_ME@postgres:5432/agentteams?sslmode=disable"

  # Redis connection
  redis-url: "redis://:CHANGE_ME@redis:6379/0"

  # RabbitMQ connection
  rabbitmq-url: "amqp://agentteams:CHANGE_ME@rabbitmq:5672/"

  # MinIO credentials
  minio-access-key: "CHANGE_ME"
  minio-secret-key: "CHANGE_ME"

  # JWT signing key (generate with: openssl rand -hex 32)
  jwt-secret: "CHANGE_ME_TO_RANDOM_64_HEX_CHARS"
