openapi: 3.0.3
info:
  title: AgentTeams API
  description: Enterprise Windows Machine Management System API
  version: 1.0.0
  contact:
    name: AgentTeams Team

servers:
  - url: https://api.agentteams.io/api/v1
    description: Production server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Agents
    description: Agent management
  - name: Tasks
    description: Task execution
  - name: Monitor
    description: Monitoring and metrics
  - name: Users
    description: User management
  - name: Versions
    description: Version management

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: User logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /agents:
    get:
      tags: [Agents]
      summary: List all agents
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [online, offline, busy]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
    post:
      tags: [Agents]
      summary: Register new agent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentRequest'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'

  /agents/{id}:
    get:
      tags: [Agents]
      summary: Get agent by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '404':
          description: Agent not found
    delete:
      tags: [Agents]
      summary: Delete agent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent deleted

  /agents/{id}/metrics:
    get:
      tags: [Agents, Monitor]
      summary: Get agent metrics
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Agent metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'

  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, success, failed, timeout, cancelled]
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
    post:
      tags: [Tasks]
      summary: Create task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /tasks/batch:
    post:
      tags: [Tasks]
      summary: Create multiple tasks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchTaskRequest'
      responses:
        '201':
          description: Tasks created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchTaskResponse'

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
    delete:
      tags: [Tasks]
      summary: Cancel task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task cancelled

  /tasks/{id}/output:
    get:
      tags: [Tasks]
      summary: Stream task output (SSE)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task output stream
          content:
            text/event-stream:
              schema:
                type: string

  /users:
    get:
      tags: [Users]
      summary: List users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
    post:
      tags: [Users]
      summary: Create user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created

  /users/me:
    get:
      tags: [Users]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user

  /versions:
    get:
      tags: [Versions]
      summary: List versions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of versions
    post:
      tags: [Versions]
      summary: Upload new version
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadVersionRequest'
      responses:
        '201':
          description: Version uploaded

  /dashboard/stats:
    get:
      tags: [Monitor]
      summary: Dashboard statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'

  /health:
    get:
      tags: [Monitor]
      summary: Health check
      responses:
        '200':
          description: Service is healthy

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer

    CreateAgentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
        metadata:
          type: object

    AgentResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [online, offline, busy]
        version:
          type: string
        last_seen_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    AgentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'

    CreateTaskRequest:
      type: object
      required:
        - agent_id
        - command_type
      properties:
        agent_id:
          type: string
        command_type:
          type: string
          enum: [exec_shell, init_machine, clean_disk]
        params:
          type: object
        timeout:
          type: integer
          default: 300

    BatchTaskRequest:
      type: object
      properties:
        agent_ids:
          type: array
          items:
            type: string
        command_type:
          type: string
        params:
          type: object
        timeout:
          type: integer

    TaskResponse:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
        command_type:
          type: string
        status:
          type: string
          enum: [pending, running, success, failed, timeout, cancelled]
        exit_code:
          type: integer
        output:
          type: string
        duration:
          type: number
        created_at:
          type: string
          format: date-time

    TaskListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'

    MetricsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              cpu_usage:
                type: number
              memory_used:
                type: integer
              memory_total:
                type: integer
              disk_used:
                type: integer
              disk_total:
                type: integer

    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, operator, viewer]

    UploadVersionRequest:
      type: object
      properties:
        version:
          type: string
        file:
          type: string
          format: binary

    DashboardStats:
      type: object
      properties:
        total_agents:
          type: integer
        online_agents:
          type: integer
        offline_agents:
          type: integer
        busy_agents:
          type: integer
        total_tasks_today:
          type: integer
        success_rate:
          type: number

    Pagination:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
